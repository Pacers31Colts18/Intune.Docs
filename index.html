<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Intune Docs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css" id="hljs-theme" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <style>
    /* ── Variables ─────────────────────────────────────────────────── */
    :root {
      --sidebar-w: 270px;
      --header-h: 52px;
    }
    [data-theme="dark"] {
      --bg:         #0f1117;
      --bg-sidebar: #13161f;
      --bg-card:    #1a1d27;
      --bg-hover:   #1f2235;
      --bg-header:  #13161f;
      --border:     #252836;
      --border-hi:  #3a3d52;
      --text:       #e2e4ef;
      --text-dim:   #9499b7;
      --text-mute:  #555870;
      --accent:     #0078d4;
      --accent-dim: #1a4a7a;
      --tag-bg:     #1e2235;
    }
    [data-theme="light"] {
      --bg:         #f4f6fa;
      --bg-sidebar: #ffffff;
      --bg-card:    #ffffff;
      --bg-hover:   #eef1f8;
      --bg-header:  #ffffff;
      --border:     #e0e3ef;
      --border-hi:  #c0c5de;
      --text:       #1a1d2e;
      --text-dim:   #4a4e6a;
      --text-mute:  #8a8ea8;
      --accent:     #0078d4;
      --accent-dim: #d0e8f8;
      --tag-bg:     #eef3fa;
    }

    /* ── Reset ─────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 14px;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ────────────────────────────────────────────────────── */
    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: var(--header-h);
      background: var(--bg-header);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
      padding: 0 16px;
    }
    .header-logo {
      font-weight: 700; font-size: 16px; letter-spacing: 0.3px;
      white-space: nowrap; display: flex; align-items: center; gap: 6px;
    }
    .header-logo-accent { color: var(--accent); }
    .header-search-wrap {
      flex: 1; max-width: 420px;
      display: flex; align-items: center;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 6px; padding: 0 10px; gap: 6px;
    }
    .header-search-wrap svg { flex-shrink: 0; opacity: 0.4; }
    #search {
      flex: 1; border: none; background: transparent; outline: none;
      color: var(--text); font-size: 13px; padding: 6px 0;
      font-family: inherit;
    }
    #search::placeholder { color: var(--text-mute); }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .btn {
      background: transparent; border: 1px solid var(--border);
      color: var(--text-dim); border-radius: 5px; cursor: pointer;
      padding: 5px 10px; font-size: 12px; font-family: inherit;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn:hover { border-color: var(--border-hi); color: var(--text); }
    #menu-btn { display: none; }

    /* ── Layout ────────────────────────────────────────────────────── */
    .layout {
      display: flex;
      margin-top: var(--header-h);
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    /* ── Sidebar ───────────────────────────────────────────────────── */
    #sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
      transition: transform 0.2s;
    }
    .sidebar-inner {
      overflow-y: auto; flex: 1;
      padding: 8px 0 24px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .sidebar-meta {
      padding: 8px 14px 6px;
      font-size: 11px; color: var(--text-mute);
      font-family: 'JetBrains Mono', monospace;
      border-bottom: 1px solid var(--border);
      margin-bottom: 4px;
    }

    /* Category accordion */
    .cat-group { border-bottom: 1px solid var(--border); }
    .cat-btn {
      width: 100%; background: none; border: none; cursor: pointer;
      color: var(--text); font-family: inherit; font-size: 13px;
      display: flex; align-items: center; gap: 8px;
      padding: 9px 14px; text-align: left;
      transition: background 0.1s;
    }
    .cat-btn:hover { background: var(--bg-hover); }
    .cat-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .cat-label { flex: 1; font-weight: 500; }
    .cat-count {
      font-size: 11px; color: var(--text-mute);
      font-family: 'JetBrains Mono', monospace;
      background: var(--tag-bg); border-radius: 3px;
      padding: 1px 5px;
    }
    .cat-chevron {
      font-size: 10px; color: var(--text-mute);
      transition: transform 0.15s; flex-shrink: 0;
    }
    .cat-group.open .cat-chevron { transform: rotate(90deg); }

    /* Policy list */
    .policy-list { display: none; }
    .cat-group.open .policy-list { display: block; }
    .policy-item {
      display: block; width: 100%; background: none; border: none;
      cursor: pointer; color: var(--text-dim); font-family: inherit;
      font-size: 12.5px; padding: 6px 14px 6px 30px; text-align: left;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      transition: background 0.1s, color 0.1s;
      border-left: 2px solid transparent;
    }
    .policy-item:hover { background: var(--bg-hover); color: var(--text); }
    .policy-item.active {
      color: var(--accent); background: var(--accent-dim);
      border-left-color: var(--accent);
    }
    .policy-item.hidden { display: none; }

    /* ── Content ───────────────────────────────────────────────────── */
    #content {
      flex: 1; overflow-y: auto; padding: 28px 32px;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }

    /* Welcome screen */
    .welcome-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px; margin-top: 20px;
    }
    .welcome-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 8px; padding: 16px 18px; cursor: pointer;
      transition: border-color 0.15s, background 0.1s;
      display: flex; flex-direction: column; gap: 6px;
    }
    .welcome-card:hover { border-color: var(--border-hi); background: var(--bg-hover); }
    .welcome-card-top { display: flex; align-items: center; gap: 8px; }
    .welcome-card-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .welcome-card-name { font-weight: 600; font-size: 13px; }
    .welcome-card-count { font-size: 24px; font-weight: 700; color: var(--accent); }
    .welcome-card-label { font-size: 12px; color: var(--text-mute); }
    .welcome-heading { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .welcome-sub { color: var(--text-dim); font-size: 14px; }
    .welcome-ts { font-size: 11px; color: var(--text-mute); font-family: 'JetBrains Mono', monospace; margin-top: 4px; }

    /* Breadcrumb */
    .breadcrumb {
      font-size: 12px; color: var(--text-mute);
      display: flex; align-items: center; gap: 6px;
      margin-bottom: 16px; flex-wrap: wrap;
    }
    .breadcrumb-sep { opacity: 0.4; }
    .breadcrumb-link {
      color: var(--accent); cursor: pointer; text-decoration: none;
    }
    .breadcrumb-link:hover { text-decoration: underline; }

    /* Tab bar */
    .tab-bar {
      display: flex; gap: 0; margin-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text-mute); font-family: inherit; font-size: 13px;
      padding: 8px 16px; border-bottom: 2px solid transparent;
      margin-bottom: -1px; transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-btn:disabled { opacity: 0.35; cursor: default; }

    /* ── Markdown content ──────────────────────────────────────────── */
    .md-body { max-width: 820px; }
    .md-body h1 {
      font-size: 22px; font-weight: 700; margin-bottom: 14px;
      padding-bottom: 10px; border-bottom: 1px solid var(--border);
      line-height: 1.3;
    }
    .md-body h2 {
      font-size: 16px; font-weight: 600; margin: 28px 0 10px;
      color: var(--text);
    }
    .md-body h3 {
      font-size: 14px; font-weight: 600; margin: 20px 0 8px;
      color: var(--text-dim);
    }
    .md-body p { margin-bottom: 10px; color: var(--text-dim); line-height: 1.7; }
    .md-body strong { color: var(--text); font-weight: 600; }
    .md-body a { color: var(--accent); text-decoration: none; }
    .md-body a:hover { text-decoration: underline; }
    .md-body hr {
      border: none; border-top: 1px solid var(--border); margin: 20px 0;
    }
    .md-body ul, .md-body ol {
      padding-left: 20px; margin-bottom: 10px; color: var(--text-dim);
    }
    .md-body li { margin-bottom: 4px; }

    /* metadata pills */
    .md-body p strong:first-child {
      display: inline-block;
      background: var(--tag-bg); border: 1px solid var(--border);
      border-radius: 4px; padding: 1px 7px; font-size: 11px;
      color: var(--text-mute); margin-right: 4px;
    }

    /* Code blocks */
    .md-body pre {
      position: relative; margin: 10px 0;
      border-radius: 6px; border: 1px solid var(--border);
      overflow: hidden;
    }
    .md-body pre code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px; line-height: 1.6;
      display: block; padding: 14px 16px;
      overflow-x: auto;
    }
    [data-theme="light"] .md-body pre code { background: #f6f8fa; }

    /* Copy button */
    .copy-btn {
      position: absolute; top: 6px; right: 8px;
      background: var(--bg-card); border: 1px solid var(--border);
      color: var(--text-mute); border-radius: 4px;
      font-size: 11px; font-family: 'JetBrains Mono', monospace;
      padding: 2px 8px; cursor: pointer;
      transition: color 0.1s, border-color 0.1s;
      opacity: 0; transition: opacity 0.15s;
    }
    .md-body pre:hover .copy-btn { opacity: 1; }
    .copy-btn:hover { color: var(--text); border-color: var(--border-hi); }
    .copy-btn.copied { color: #107c10; border-color: #107c10; }

    /* Collapsed large blocks */
    .block-collapse {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 6px; margin: 10px 0; overflow: hidden;
    }
    .block-collapse-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 14px; cursor: pointer;
      background: var(--tag-bg); user-select: none;
    }
    .block-collapse-header:hover { background: var(--bg-hover); }
    .block-collapse-label {
      font-size: 12px; font-family: 'JetBrains Mono', monospace;
      color: var(--text-mute); display: flex; align-items: center; gap: 8px;
    }
    .block-collapse-toggle {
      font-size: 11px; color: var(--accent); cursor: pointer;
      background: none; border: none; font-family: inherit;
    }
    .block-collapse-body { display: none; }
    .block-collapse.open .block-collapse-body { display: block; }
    .block-collapse.open .block-collapse-header { border-bottom: 1px solid var(--border); }

    /* Loading / error states */
    .state-msg {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 60px 20px; gap: 10px;
      color: var(--text-mute); text-align: center;
    }
    .state-msg .state-icon { font-size: 32px; opacity: 0.4; }
    .spinner {
      width: 22px; height: 22px; border-radius: 50%;
      border: 2px solid var(--border); border-top-color: var(--accent);
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      #menu-btn { display: flex; }
      #sidebar {
        position: fixed; top: var(--header-h); left: 0; bottom: 0;
        z-index: 90; transform: translateX(-100%);
      }
      #sidebar.open { transform: translateX(0); box-shadow: 4px 0 20px rgba(0,0,0,0.4); }
      #content { padding: 20px 16px; }
      .welcome-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <button class="btn" id="menu-btn" onclick="toggleSidebar()" title="Menu">&#9776;</button>
  <div class="header-logo">
    <span>Intune</span><span class="header-logo-accent">Docs</span>
  </div>
  <div class="header-search-wrap">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
      <circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.5"/>
      <path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <input type="text" id="search" placeholder="Filter policies…" oninput="handleSearch(this.value)" autocomplete="off" />
  </div>
  <div class="header-right">
    <button class="btn" id="theme-btn" onclick="toggleTheme()">&#9790;</button>
  </div>
</header>

<div class="layout">
  <nav id="sidebar">
    <div class="sidebar-meta" id="sidebar-meta">loading…</div>
    <div class="sidebar-inner" id="sidebar-inner"></div>
  </nav>
  <main id="content">
    <div class="state-msg"><div class="spinner"></div><div>Loading…</div></div>
  </main>
</div>

<script>
/* ── State ──────────────────────────────────────────────────────────── */
let manifest    = null;
let activeFile  = null;
let activeTab   = 'policy';
let openCats    = new Set();

/* ── Category colors ────────────────────────────────────────────────── */
const CAT_COLORS = {
  ConfigurationPolicies:          '#0078d4',
  DeviceCompliancePolicies:       '#107c10',
  DeviceConfigurations:           '#8764b8',
  DeviceEnrollmentConfigurations: '#d83b01',
  DeviceHealthScripts:            '#e81123',
  DeviceManagementScripts:        '#00b294',
  WindowsAutopilotDeploymentProfiles: '#005a9e',
};

/* ── Theme ──────────────────────────────────────────────────────────── */
function toggleTheme() {
  const html  = document.documentElement;
  const isDark = html.dataset.theme === 'dark';
  html.dataset.theme = isDark ? 'light' : 'dark';
  document.getElementById('theme-btn').textContent = isDark ? '☀' : '☽';
  document.getElementById('hljs-theme').href = isDark
    ? 'https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css'
    : 'https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css';
  try { localStorage.setItem('id-theme', html.dataset.theme); } catch(_) {}
}
(function initTheme() {
  try {
    const t = localStorage.getItem('id-theme');
    if (t) {
      document.documentElement.dataset.theme = t;
      document.getElementById('theme-btn').textContent = t === 'dark' ? '☽' : '☀';
      if (t === 'light') {
        document.getElementById('hljs-theme').href =
          'https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css';
      }
    }
  } catch(_) {}
})();

/* ── Sidebar toggle (mobile) ────────────────────────────────────────── */
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

/* ── Load manifest ──────────────────────────────────────────────────── */
async function loadManifest() {
  try {
    const res = await fetch('manifest.json?_=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    manifest = await res.json();
    buildSidebar();
    const ts = manifest.generatedAt
      ? new Date(manifest.generatedAt).toLocaleString('en-US', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'})
      : '';
    document.getElementById('sidebar-meta').textContent = ts ? 'updated ' + ts : '';
    routeFromHash();
  } catch(err) {
    document.getElementById('content').innerHTML =
      `<div class="state-msg"><div class="state-icon">&#10005;</div>
       <div style="font-weight:600">Failed to load manifest</div>
       <div style="font-size:12px">${esc(err.message)}</div>
       <div style="font-size:12px;color:var(--text-mute)">Run the "Build Site Manifest" workflow to generate manifest.json</div></div>`;
    document.getElementById('sidebar-inner').innerHTML =
      '<div style="padding:16px;font-size:12px;color:var(--text-mute)">manifest.json not found</div>';
  }
}

/* ── Build sidebar ──────────────────────────────────────────────────── */
function buildSidebar() {
  const inner = document.getElementById('sidebar-inner');
  inner.innerHTML = '';

  for (const cat of manifest.categories) {
    const color = CAT_COLORS[cat.id] || '#0078d4';
    const group = document.createElement('div');
    group.className = 'cat-group';
    group.id = 'cat-' + cat.id;

    const btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.innerHTML = `
      <span class="cat-dot" style="background:${color}"></span>
      <span class="cat-label">${esc(cat.label)}</span>
      <span class="cat-count">${cat.count}</span>
      <span class="cat-chevron">&#9654;</span>`;
    btn.onclick = () => toggleCat(group, cat.id);

    const list = document.createElement('div');
    list.className = 'policy-list';
    list.id = 'list-' + cat.id;

    for (const policy of cat.policies) {
      const item = document.createElement('button');
      item.className = 'policy-item';
      item.dataset.file  = policy.file;
      item.dataset.cat   = cat.id;
      item.dataset.name  = policy.displayName.toLowerCase();
      item.title         = policy.displayName;
      item.textContent   = policy.displayName;
      item.onclick       = () => { loadPolicy(policy, cat); closeSidebarMobile(); };
      list.appendChild(item);
    }

    group.appendChild(btn);
    group.appendChild(list);
    inner.appendChild(group);
  }
}

function toggleCat(group, catId) {
  const isOpen = group.classList.contains('open');
  group.classList.toggle('open', !isOpen);
  isOpen ? openCats.delete(catId) : openCats.add(catId);
}

function openCatById(catId) {
  const group = document.getElementById('cat-' + catId);
  if (group && !group.classList.contains('open')) {
    group.classList.add('open');
    openCats.add(catId);
  }
}

function closeSidebarMobile() {
  if (window.innerWidth <= 768) {
    document.getElementById('sidebar').classList.remove('open');
  }
}

/* ── Search ─────────────────────────────────────────────────────────── */
function handleSearch(q) {
  const query = q.toLowerCase().trim();
  const items = document.querySelectorAll('.policy-item');
  let matchCats = new Set();

  items.forEach(item => {
    const match = !query || item.dataset.name.includes(query);
    item.classList.toggle('hidden', !match);
    if (match && query) matchCats.add(item.dataset.cat);
  });

  if (query) {
    matchCats.forEach(id => openCatById(id));
  }
}

/* ── Hash routing ───────────────────────────────────────────────────── */
function routeFromHash() {
  const hash = decodeURIComponent(location.hash.slice(1));
  if (!hash || !manifest) { showWelcome(); return; }

  const [catId, ...nameParts] = hash.split('/');
  const policyName = nameParts.join('/');
  if (!catId) { showWelcome(); return; }

  const cat = manifest.categories.find(c => c.id === catId);
  if (!cat) { showWelcome(); return; }

  const policy = cat.policies.find(p => p.name === policyName);
  if (!policy) { showWelcome(); return; }

  openCatById(catId);
  loadPolicy(policy, cat);
}

window.addEventListener('hashchange', routeFromHash);

/* ── Load and render a policy ───────────────────────────────────────── */
async function loadPolicy(policy, cat) {
  setActiveItem(policy.file);
  activeFile = policy.file;
  activeTab  = 'policy';
  location.hash = encodeURIComponent(cat.id) + '/' + encodeURIComponent(policy.name);

  renderTabs(policy, cat, 'policy');
}

async function fetchAndRender(file, containerId) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = '<div class="state-msg"><div class="spinner"></div></div>';
  try {
    const res = await fetch(file + '?_=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    el.innerHTML = '<div class="md-body">' + processMarkdown(text) + '</div>';
    addCodeEnhancements(el);
  } catch(err) {
    el.innerHTML = `<div class="state-msg">
      <div class="state-icon">&#10005;</div>
      <div style="font-weight:600">Failed to load document</div>
      <div style="font-size:12px">${esc(err.message)}</div></div>`;
  }
}

function renderTabs(policy, cat, activeTabId) {
  const content = document.getElementById('content');
  const color   = CAT_COLORS[cat.id] || '#0078d4';

  content.innerHTML = `
    <div class="breadcrumb">
      <a class="breadcrumb-link" onclick="showWelcome(); location.hash=''">Home</a>
      <span class="breadcrumb-sep">/</span>
      <a class="breadcrumb-link" onclick="openCatById('${esc(cat.id)}')">${esc(cat.label)}</a>
      <span class="breadcrumb-sep">/</span>
      <span>${esc(policy.displayName)}</span>
    </div>
    <div class="tab-bar">
      <button class="tab-btn ${activeTabId==='policy'?'active':''}" id="tab-policy" onclick="switchTab('policy', arguments[0])">Policy</button>
      <button class="tab-btn ${activeTabId==='assignment'?'active':''}" id="tab-assignment"
        onclick="switchTab('assignment', arguments[0])"
        ${policy.assignment ? '' : 'disabled'}>Assignments</button>
    </div>
    <div id="tab-content"></div>`;

  content._policy = policy;
  content._cat    = cat;
  activeTab = activeTabId;

  if (activeTabId === 'policy') {
    fetchAndRender(policy.file, 'tab-content');
  } else if (policy.assignment) {
    fetchAndRender(policy.assignment, 'tab-content');
  }
}

function switchTab(tabId, evt) {
  const content = document.getElementById('content');
  const policy  = content._policy;
  const cat     = content._cat;
  if (!policy) return;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  evt.target.classList.add('active');
  activeTab = tabId;

  if (tabId === 'policy') {
    fetchAndRender(policy.file, 'tab-content');
  } else if (tabId === 'assignment' && policy.assignment) {
    fetchAndRender(policy.assignment, 'tab-content');
  }
}

function setActiveItem(file) {
  document.querySelectorAll('.policy-item').forEach(el => {
    el.classList.toggle('active', el.dataset.file === file);
  });
}

/* ── Welcome screen ─────────────────────────────────────────────────── */
function showWelcome() {
  activeFile = null;
  setActiveItem(null);
  if (!manifest) return;

  const content = document.getElementById('content');
  const total   = manifest.categories.reduce((a, c) => a + c.count, 0);
  const ts      = manifest.generatedAt
    ? new Date(manifest.generatedAt).toLocaleString('en-US', {month:'long', day:'numeric', year:'numeric', hour:'2-digit', minute:'2-digit'})
    : '';

  let cards = '';
  for (const cat of manifest.categories) {
    const color = CAT_COLORS[cat.id] || '#0078d4';
    cards += `<div class="welcome-card" onclick="openCatById('${esc(cat.id)}'); document.getElementById('list-${esc(cat.id)}').scrollIntoView({behavior:'smooth',block:'center'})">
      <div class="welcome-card-top">
        <span class="welcome-card-dot" style="background:${color}"></span>
        <span class="welcome-card-name">${esc(cat.label)}</span>
      </div>
      <div class="welcome-card-count">${cat.count}</div>
      <div class="welcome-card-label">polic${cat.count===1?'y':'ies'}</div>
    </div>`;
  }

  content.innerHTML = `
    <div class="welcome-heading">Intune Docs</div>
    <div class="welcome-sub">${total} policies across ${manifest.categories.length} categories</div>
    ${ts ? `<div class="welcome-ts">Last updated: ${ts}</div>` : ''}
    <div class="welcome-grid">${cards}</div>`;
}

/* ── Markdown processing ────────────────────────────────────────────── */
function processMarkdown(text) {
  const renderer = new marked.Renderer();

  renderer.link = function(href, title, text) {
    const isExternal = /^https?:\/\//.test(href);
    if (isExternal) {
      return `<a href="${href}" target="_blank" rel="noopener noreferrer"${title ? ' title="'+title+'"' : ''}>${text}</a>`;
    }
    return `<a href="${href}"${title ? ' title="'+title+'"' : ''}>${text}</a>`;
  };

  marked.setOptions({ renderer, breaks: false, gfm: true });
  return marked.parse(text);
}

function addCodeEnhancements(container) {
  container.querySelectorAll('pre > code').forEach(code => {
    const pre  = code.parentElement;
    const text = code.textContent;

    // Detect PowerShell by content patterns
    const isPS = /^\s*(\$[A-Za-z]|function\s+[A-Z]|Write-|Get-|Set-|New-|Remove-|Invoke-|Start-|Stop-)/.test(text);
    if (isPS) {
      code.className = 'language-powershell';
    } else if (!code.className || code.className === 'language-json') {
      // Try to parse as JSON — if not valid, leave as plain
      try { JSON.parse(text); code.className = 'language-json'; } catch(_) {}
    }

    // Apply highlight.js
    if (window.hljs) {
      try { hljs.highlightElement(code); } catch(_) {}
    }

    // Add copy button
    const btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.textContent = 'copy';
    btn.onclick = () => {
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = 'copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 2000);
      }).catch(() => {});
    };
    pre.appendChild(btn);

    // Collapse blocks containing long base64 strings (raw JSON blobs)
    const hasLongLine = text.split('\n').some(l => l.length > 300);
    if (hasLongLine) {
      const wrapper = document.createElement('div');
      wrapper.className = 'block-collapse';

      const header = document.createElement('div');
      header.className = 'block-collapse-header';
      header.innerHTML = `
        <span class="block-collapse-label">
          <span>&#128274;</span> Raw data (collapsed — contains base64 encoded content)
        </span>
        <button class="block-collapse-toggle">Show</button>`;
      header.onclick = () => {
        wrapper.classList.toggle('open');
        header.querySelector('.block-collapse-toggle').textContent =
          wrapper.classList.contains('open') ? 'Hide' : 'Show';
      };

      const body = document.createElement('div');
      body.className = 'block-collapse-body';

      pre.parentElement.insertBefore(wrapper, pre);
      body.appendChild(pre);
      wrapper.appendChild(header);
      wrapper.appendChild(body);
    }
  });

  // Make external links in assignment pages open in new tab
  container.querySelectorAll('a[href^="http"]').forEach(a => {
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
  });
}

/* ── Helpers ────────────────────────────────────────────────────────── */
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
